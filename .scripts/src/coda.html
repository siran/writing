<meta charset="utf-8">
<style>
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        font-size: 1em;
        display: inline-block;
    }



    /* default: raw markdown view (no JS) */
    body {
        white-space: preserve-breaks;
        font-family: monospace;
        font-size: 18px;
        line-height: 1.5;
    }

    .md-container img {
        max-width: 66%
    }

    .md-container {
        max-width: 66%;
        margin: 0 auto;
        padding: 0 1.25rem;
        box-sizing: border-box;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 17px;
        line-height: 1.5;
        white-space: normal;
    }

    /* Headings: block + proper sizes (overrides global inline-block/1em defaults) */
    .md-container h1,
    .md-container h2,
    .md-container h3,
    .md-container h4,
    .md-container h5,
    .md-container h6 {
        display: block;
        font-weight: bold;
        margin-bottom: 0.25em;
    }
    .md-container h1 { font-size: 1.45em; margin-top: 1.4em; }
    .md-container h2 { font-size: 1.18em; margin-top: 1.1em; }
    .md-container h3 { font-size: 1.04em; margin-top: 0.9em; }
    .md-container h4,
    .md-container h5,
    .md-container h6 { font-size: 1em; margin-top: 0.75em; }

    /* First heading at top of page: no extra top margin */
    .md-container > h1:first-child,
    .md-container > h2:first-child { margin-top: 0.4em; }

    .md-container p { margin: 0 0 0.5em 0; white-space: pre-line; }
    .md-container p:last-child { margin-bottom: 0; }

    /* Display math rendered by KaTeX: center in the container. */
    .md-container .math-display {
        display: block;
        text-align: center;
        margin: 0.75em 0;
        white-space: normal;
    }

    @media (max-width: 960px) {
        .md-container {
            max-width: 100%;
        }
    }

    a {
        text-decoration: none;
    }

    a.breadcrumbs:visited {
        text-decoration: none;
    }

    .heading-anchor {
        margin-left: 0.35em;
        text-decoration: none;
        opacity: 0;
        font-size: 0.85em;
        color: inherit;
        transition: opacity 0.15s ease;
    }

    .heading-anchor::after {
        content: "\1F517";
    }

    h1:hover .heading-anchor,
    h2:hover .heading-anchor,
    h3:hover .heading-anchor,
    h4:hover .heading-anchor,
    h5:hover .heading-anchor,
    h6:hover .heading-anchor,
    .heading-anchor:focus {
        opacity: 1;
    }

    .heading-anchor:hover {
        text-decoration: none;
    }

    /* markdown-style pages (directory indexes, header/footer text) */
    main>pre,
    main.paper~* {
        white-space: pre-wrap;
        font-family: monospace;
        font-size: 18px;
        line-height: 1.5;
    }

    /* embedded HTML paper: normal HTML look */
    main.paper {
        white-space: normal;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        line-height: 1.6;
        max-width: 72ch;
        margin: 1.25rem auto;
    }

    main.paper * {
        white-space: normal;
    }

    .dir-index-controls {
        margin: 0.05rem 0 0.2rem;
    }

    .dir-index-controls a.is-active {
        text-decoration: underline;
    }

    .dir-index-filter {
        margin: 0.05rem 0 0.15rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
    }

    .dir-index-filter-label {
        white-space: nowrap;
    }

    .dir-index-filter-input {
        flex: 1 1 16rem;
        max-width: 32rem;
        padding: 0.25rem 0.4rem;
        font: inherit;
        box-sizing: border-box;
    }

    .dir-index-filter-scope {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        white-space: nowrap;
    }

    .dir-index-search-results {
        margin: 0.05rem 0 0.2rem;
    }

    .dir-index-search-meta {
        margin: 0 0 0.35rem;
    }

    .dir-index-search-results ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .dir-index-search-results li {
        margin: 0.1rem 0;
    }

    .dir-index-search-snippet,
    .dir-index-search-keywords {
        font-size: 0.9em;
    }

    .dir-index-search-title {
        font-size: 0.92em;
        font-weight: 600;
    }

    .dir-index-search-keywords {
        margin-top: 0.1rem;
    }

    .dir-index-table {
        white-space: pre;
        font-family: inherit;
        font-size: inherit;
        line-height: inherit;
    }
</style>
<script>
    (function () {
        try {
            var html = document.body.innerHTML;

            // Collapse wrapped lines inside Markdown link targets back into single spaces.
            var normalizeTarget = function (value) {
                return value.replace(/[ \t]*[\r\n]+[ \t]*/g, " ").trim();
            };

            // Markdown images: ![alt](url "optional title")
            // Run this BEFORE link conversion.
            html = html.replace(
                /!\[([^\]]*)\]\(([^)\s]+)(?:\s+"([^"]*)")?\)/g,
                function (_m, alt, src, title) {
                    src = normalizeTarget(src);
                    alt = (alt || "").replace(/"/g, "&quot;");
                    var t = title ? ' title="' + title.replace(/"/g, "&quot;") + '"' : "";
                    return '<img src="' + src + '" alt="' + alt + '"' + t + '>';
                }
            );

            // Headings: # .. ###### at start of line
            html = html.replace(/(^|\n)######\s+([^\n]+)(?=\n|$)/g, "$1<h6>$2</h6>");
            html = html.replace(/(^|\n)#####\s+([^\n]+)(?=\n|$)/g, "$1<h5>$2</h5>");
            html = html.replace(/(^|\n)####\s+([^\n]+)(?=\n|$)/g, "$1<h4>$2</h4>");
            html = html.replace(/(^|\n)###\s+([^\n]+)(?=\n|$)/g, "$1<h3>$2</h3>");
            html = html.replace(/(^|\n)##\s+([^\n]+)(?=\n|$)/g, "$1<h2>$2</h2>");
            html = html.replace(/(^|\n)#\s+([^\n]+)(?=\n|$)/g, "$1<h1>$2</h1>");

            // Markdown links: [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_m, t, u) {
                return '<a href="' + normalizeTarget(u) + '">' + t + "</a>";
            });

            // Bare URLs → <a>; don't match inside ) etc.
            html = html.replace(/(^|\s)(https?:\/\/[^\s)]+)/g, '$1<a href="$2">$2</a>');

            document.body.innerHTML = html;

            // Paragraph-wrap .md-container content so white-space:normal collapses
            // blank lines cleanly. Block-level tags are passed through; runs of text
            // lines are joined into <p> elements.
            var mdc = document.querySelector('.md-container');
            if (mdc) {
                var BLOCK = /^<\s*\/?\s*(h[1-6]|p|pre|div|ul|ol|li|blockquote|hr|table|thead|tbody|tfoot|tr|th|td|figure|figcaption|section|article|header|footer|nav|aside|img)\b/i;
                var clines = mdc.innerHTML.split('\n');
                var cout = [];
                var cbuf = [];
                var flushC = function () {
                    var t = cbuf.join('\n').trim();
                    if (t) { cout.push('<p>' + t + '</p>'); }
                    cbuf = [];
                };
                for (var ci = 0; ci < clines.length; ci++) {
                    var cl = clines[ci].trim();
                    if (!cl) { flushC(); }
                    else if (BLOCK.test(cl)) { flushC(); cout.push(cl); }
                    else { cbuf.push(cl); }
                }
                flushC();
                mdc.innerHTML = cout.join('\n');
            }
        } catch (e) { }
    })();
</script>
<script>
    (function () {
        function slugify(text) {
            return (text || "")
                .toLowerCase()
                .replace(/[^0-9a-zA-Z _-]+/g, "")
                .trim()
                .replace(/\s+/g, "-")
                .replace(/-+/g, "-")
                .replace(/^-+|-+$/g, "") || "section";
        }

        function headingText(el) {
            var clone = el.cloneNode(true);
            var drop = clone.querySelectorAll(".heading-anchor, .header-section-number");
            for (var i = 0; i < drop.length; i++) {
                if (drop[i].parentNode) {
                    drop[i].parentNode.removeChild(drop[i]);
                }
            }
            return (clone.textContent || "").trim();
        }

        function ensureId(el, used) {
            var id = el.getAttribute("id") || "";
            if (id) {
                used[id] = true;
                return id;
            }
            var base = slugify(headingText(el));
            var cand = base;
            var i = 1;
            while (!cand || document.getElementById(cand) || used[cand]) {
                cand = base + "-" + i;
                i += 1;
            }
            el.setAttribute("id", cand);
            used[cand] = true;
            return cand;
        }

        function addAnchors(root) {
            if (!root) {
                return;
            }
            var headings = root.querySelectorAll("h1, h2, h3, h4, h5, h6");
            var used = {};
            for (var i = 0; i < headings.length; i++) {
                var h = headings[i];
                if (h.querySelector("a.heading-anchor")) {
                    continue;
                }
                var id = ensureId(h, used);
                var a = document.createElement("a");
                a.className = "heading-anchor";
                a.href = "#" + id;
                a.setAttribute("aria-label", "Link to this section");
                a.setAttribute("title", "Link to this section");
                h.appendChild(a);
            }
        }

        function run() {
            var root = document.querySelector("main.paper")
                || document.querySelector(".md-container")
                || document.body;
            addAnchors(root);
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", run);
        } else {
            run();
        }
    })();
</script>
<script>
    (function () {
        function defaultDirFor(key) {
            return key === "modified" ? "desc" : "asc";
        }

        var DATE_WIDTH = 16;
        var GAP = 2;
        var NAME_OFFSET = DATE_WIDTH + GAP;
        var SEARCH_INDEX = null;
        var SEARCH_INDEX_LOADING = false;
        var SEARCH_INDEX_WAITERS = [];

        function parseDate(text) {
            var m = (text || "").match(/(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})/);
            if (!m) {
                return 0;
            }
            return Date.UTC(
                parseInt(m[1], 10),
                parseInt(m[2], 10) - 1,
                parseInt(m[3], 10),
                parseInt(m[4], 10),
                parseInt(m[5], 10)
            );
        }

        function parseRow(line) {
            if (!line || line.length < NAME_OFFSET) {
                return null;
            }
            var modified = line.slice(0, DATE_WIDTH).trim();
            var nameHtml = line.slice(NAME_OFFSET).trim();
            return {
                modified: modified,
                nameHtml: nameHtml
            };
        }

        function cellText(html) {
            var span = document.createElement("span");
            span.innerHTML = html || "";
            return (span.textContent || "").trim();
        }

        function escapeHtml(text) {
            return (text || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function escapeRegExp(text) {
            return (text || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        }

        function highlightText(text, tokens) {
            var out = escapeHtml(text || "");
            if (!tokens || !tokens.length) {
                return out;
            }
            for (var i = 0; i < tokens.length; i++) {
                var t = tokens[i];
                if (!t) {
                    continue;
                }
                var re = new RegExp(escapeRegExp(t), "ig");
                out = out.replace(re, function (m) {
                    return "<mark>" + m + "</mark>";
                });
            }
            return out;
        }

        function textMatches(value, tokens) {
            if (!value) {
                return false;
            }
            return matchesQuery(String(value).toLowerCase(), tokens);
        }

        function rowSearchText(nameHtml) {
            var span = document.createElement("span");
            span.innerHTML = nameHtml || "";
            var link = span.querySelector("a");
            var text = link && link.textContent ? link.textContent : (span.textContent || "");
            text = text.replace(/^[📂📄]\s*/, "");
            return text.toLowerCase();
        }

        function nameSortKey(value) {
            var text = (value || "").replace(/^[📂📄]\s*/, "");
            text = text.replace(/\s*\(.*\)\s*$/, "");
            return text.toLowerCase();
        }

        function isDir(value) {
            return (value || "").indexOf("📂") === 0 ? 0 : 1;
        }

        function findTable(pre) {
            var lines = (pre.innerHTML || "").split(/\r?\n/);
            var headerIdx = -1;
            for (var i = 0; i < lines.length; i++) {
                var t = lines[i].trim();
                if (/^Modified\s+Name$/.test(t)) {
                    headerIdx = i;
                    break;
                }
            }
            if (headerIdx < 0 || headerIdx + 2 >= lines.length) {
                return null;
            }
            var rowsStart = headerIdx + 2;
            var rows = [];
            var rowsEnd = rowsStart;
            for (var j = rowsStart; j < lines.length; j++) {
                var line = lines[j];
                var trimmed = line.trim();
                if (!trimmed) {
                    break;
                }
                if (!parseRow(line)) {
                    break;
                }
                rows.push(line);
                rowsEnd = j + 1;
            }
            return {
                lines: lines,
                rows: rows,
                rowsStart: rowsStart,
                rowsEnd: rowsEnd
            };
        }

        function tokenizeQuery(value) {
            var q = (value || "").toLowerCase().trim();
            if (!q) {
                return [];
            }
            var parts = q.split(/[\s,]+/);
            var out = [];
            for (var i = 0; i < parts.length; i++) {
                if (parts[i]) {
                    out.push(parts[i]);
                }
            }
            return out;
        }

        function matchesQuery(text, tokens) {
            if (!tokens.length) {
                return true;
            }
            var t = text || "";
            for (var i = 0; i < tokens.length; i++) {
                if (t.indexOf(tokens[i]) === -1) {
                    return false;
                }
            }
            return true;
        }

        function filterRows(rows, query) {
            var tokens = tokenizeQuery(query);
            if (!tokens.length) {
                return rows;
            }
            var out = [];
            for (var i = 0; i < rows.length; i++) {
                var row = parseRow(rows[i]);
                if (!row) {
                    continue;
                }
                var name = rowSearchText(row.nameHtml || "");
                if (matchesQuery(name, tokens)) {
                    out.push(rows[i]);
                }
            }
            return out;
        }

        function getBaseData(pre) {
            var data = pre._dirIndexData;
            if (data) {
                return data;
            }
            var found = findTable(pre);
            if (!found) {
                return null;
            }
            data = {
                lines: found.lines.slice(),
                rows: found.rows.slice(),
                rowsStart: found.rowsStart,
                rowsCount: found.rows.length
            };
            pre._dirIndexData = data;
            return data;
        }

        function loadSearchIndex(done) {
            if (SEARCH_INDEX) {
                done(SEARCH_INDEX);
                return;
            }
            if (SEARCH_INDEX_LOADING) {
                SEARCH_INDEX_WAITERS.push(done);
                return;
            }
            SEARCH_INDEX_LOADING = true;
            SEARCH_INDEX_WAITERS.push(done);

            function finish(list) {
                if (!SEARCH_INDEX_LOADING && SEARCH_INDEX) {
                    return;
                }
                SEARCH_INDEX = list || [];
                SEARCH_INDEX_LOADING = false;
                var waiters = SEARCH_INDEX_WAITERS.slice();
                SEARCH_INDEX_WAITERS.length = 0;
                for (var i = 0; i < waiters.length; i++) {
                    try {
                        waiters[i](SEARCH_INDEX);
                    } catch (e) { }
                }
            }

            if (window.fetch) {
                fetch("/search-index.json").then(function (resp) {
                    if (!resp || !resp.ok) {
                        finish([]);
                        return null;
                    }
                    return resp.json();
                }).then(function (data) {
                    if (data) {
                        finish(data);
                    } else if (data === null) {
                        return;
                    } else {
                        finish([]);
                    }
                }).catch(function () {
                    finish([]);
                });
                return;
            }

            try {
                var xhr = new XMLHttpRequest();
                xhr.open("GET", "/search-index.json", true);
                xhr.onreadystatechange = function () {
                    if (xhr.readyState !== 4) {
                        return;
                    }
                    if (xhr.status >= 200 && xhr.status < 300) {
                        try {
                            var data = JSON.parse(xhr.responseText || "[]");
                            finish(data);
                        } catch (e) {
                            finish([]);
                        }
                    } else {
                        finish([]);
                    }
                };
                xhr.send();
            } catch (e) {
                finish([]);
            }
        }

        function indexSearchText(entry) {
            var parts = [];
            if (entry.path) {
                parts.push(entry.path);
            }
            if (entry.title) {
                parts.push(entry.title);
            }
            if (entry.subtitle) {
                parts.push(entry.subtitle);
            }
            if (entry.onesent) {
                parts.push(entry.onesent);
            }
            if (entry.summary) {
                parts.push(entry.summary);
            }
            if (entry.keywords && entry.keywords.length) {
                parts.push(entry.keywords.join(" "));
            }
            return parts.join(" ").toLowerCase();
        }

        function filterIndex(list, query, prefix) {
            var tokens = tokenizeQuery(query);
            if (!tokens.length) {
                return [];
            }
            var scope = (prefix || "").toLowerCase();
            var out = [];
            for (var i = 0; i < list.length; i++) {
                var entry = list[i] || {};
                var path = (entry.path || "").toLowerCase();
                if (scope && path.indexOf(scope) !== 0) {
                    continue;
                }
                var text = indexSearchText(entry);
                if (matchesQuery(text, tokens)) {
                    out.push(entry);
                }
            }
            return out;
        }

        function sortRows(rows, key, dir) {
            var sorted = rows.slice();
            sorted.sort(function (a, b) {
                var ra = parseRow(a) || {};
                var rb = parseRow(b) || {};
                var nameA = cellText(ra.nameHtml || "");
                var nameB = cellText(rb.nameHtml || "");
                var dirA = isDir(nameA);
                var dirB = isDir(nameB);
                var baseA = nameSortKey(nameA);
                var baseB = nameSortKey(nameB);

                if (key === "name") {
                    if (dirA !== dirB) {
                        return dir === "asc" ? (dirA - dirB) : (dirB - dirA);
                    }
                    if (baseA < baseB) {
                        return dir === "asc" ? -1 : 1;
                    }
                    if (baseA > baseB) {
                        return dir === "asc" ? 1 : -1;
                    }
                    return 0;
                }

                var ta = parseDate(ra.modified || "");
                var tb = parseDate(rb.modified || "");
                if (ta < tb) {
                    return dir === "asc" ? -1 : 1;
                }
                if (ta > tb) {
                    return dir === "asc" ? 1 : -1;
                }
                if (baseA < baseB) {
                    return -1;
                }
                if (baseA > baseB) {
                    return 1;
                }
                return 0;
            });
            return sorted;
        }

        function setActiveLinks(key) {
            var links = document.querySelectorAll(".dir-index-controls a[data-sort-link]");
            for (var i = 0; i < links.length; i++) {
                var a = links[i];
                if (a.getAttribute("data-sort-link") === key) {
                    a.classList.add("is-active");
                } else {
                    a.classList.remove("is-active");
                }
            }
        }

        function rootFor(pre) {
            return pre.closest(".md-container") || pre.parentElement || document;
        }

        function ensureSearchUi(pre) {
            var root = rootFor(pre);
            if (!root) {
                return;
            }
            if (root.querySelector(".dir-index-filter")) {
                return;
            }

            var filter = document.createElement("div");
            filter.className = "dir-index-filter";
            filter.innerHTML =
                '<span class="dir-index-filter-label">Filter:</span> ' +
                '<input class="dir-index-filter-input" type="search" ' +
                'placeholder="Search all files and folders" autocomplete="off" ' +
                'spellcheck="false" aria-label="Filter entries">' +
                '<label class="dir-index-filter-scope">' +
                '<input class="dir-index-filter-scope-toggle" type="checkbox" ' +
                'aria-label="Search current folder only"> ' +
                'current folder only</label>';

            var results = document.createElement("div");
            results.className = "dir-index-search-results";
            results.setAttribute("hidden", "");

            var sort = root.querySelector(".dir-index-controls");
            if (sort && sort.parentNode) {
                sort.parentNode.insertBefore(filter, sort);
                if (sort.nextSibling) {
                    sort.parentNode.insertBefore(results, sort.nextSibling);
                } else {
                    sort.parentNode.appendChild(results);
                }
            } else {
                root.insertBefore(filter, root.firstChild);
                root.insertBefore(results, filter.nextSibling);
            }
        }

        function getFilterInput(pre) {
            ensureSearchUi(pre);
            var root = rootFor(pre);
            return root.querySelector(".dir-index-filter-input");
        }

        function getScopeToggle(pre) {
            ensureSearchUi(pre);
            var root = rootFor(pre);
            return root.querySelector(".dir-index-filter-scope-toggle");
        }

        function getResultsContainer(pre) {
            ensureSearchUi(pre);
            var root = rootFor(pre);
            return root.querySelector(".dir-index-search-results");
        }

        function currentFilter(pre) {
            var input = getFilterInput(pre);
            return input ? input.value : "";
        }

        function isLocalOnly(pre) {
            var toggle = getScopeToggle(pre);
            return !!(toggle && toggle.checked);
        }

        function setHidden(el, hidden) {
            if (!el) {
                return;
            }
            if (hidden) {
                el.setAttribute("hidden", "");
                el.style.display = "none";
            } else {
                el.removeAttribute("hidden");
                el.style.display = "";
            }
        }

        function currentDirPrefix() {
            var path = window.location.pathname || "/";
            if (!path || path === "/") {
                return "";
            }
            if (!/\/$/.test(path)) {
                var parts = path.split("/");
                parts.pop();
                path = parts.join("/") + "/";
            }
            return path.replace(/^\/+/, "");
        }

        function hideGlobalResults(pre) {
            var results = getResultsContainer(pre);
            if (!results) {
                return;
            }
            results.innerHTML = "";
            setHidden(results, true);
            pre.style.display = "";
        }

        function render(pre, key, dir, query) {
            var data = getBaseData(pre);
            if (!data) {
                return;
            }
            var sorted = sortRows(data.rows, key, dir);
            var filtered = filterRows(sorted, query);
            var updated = data.lines.slice();
            updated.splice.apply(updated, [data.rowsStart, data.rowsCount].concat(filtered));
            pre.innerHTML = updated.join("\n");
            pre.setAttribute("data-sort", key);
            pre.setAttribute("data-dir", dir);
            setActiveLinks(key);
        }

        function renderGlobalResults(pre, query, prefix) {
            var results = getResultsContainer(pre);
            if (!results) {
                return;
            }
            var q = (query || "").trim();
            if (!q) {
                hideGlobalResults(pre);
                return;
            }
            pre.style.display = "none";
            setHidden(results, false);

            var token = (pre._searchToken || 0) + 1;

                if (!matches.length) {
                    html.push('<div class="dir-index-search-meta">No matches</div>');

                html.push(
                    '<div class="dir-index-search-meta">'
                    + matches.length
                    + " result"
                    + (matches.length === 1 ? "" : "s")
                    + "</div>"

                html.push("<ul>");
                for (var i = 0; i < matches.length; i++) {
                    var entry = matches[i] || {};
                    var href = escapeHtml(entry.href || "#");
                    var label = highlightText(entry.path || "", tokens);
                    html.push('<li><a href="' + href + '">' + label + "</a>");
                    var titleLine = entry.title || entry.subtitle || "";
                    if (titleLine) {
                        var combo = entry.title || "";
                        if (entry.subtitle) {
                            combo = combo ? (combo + " — " + entry.subtitle) : entry.subtitle;
                        }
                        html.push('<div class="dir-index-search-title">' + highlightText(combo, tokens) + "</div>");

                    var onesentMatch = textMatches(entry.onesent, tokens);
                    var summaryMatch = textMatches(entry.summary, tokens);

                    } else if (summaryMatch) {
                        snippet = entry.summary || "";
                    } else {
                        snippet = entry.onesent || entry.summary || "";
                    }
                    if (snippet) {
                        html.push('<div class="dir-index-search-snippet">' + highlightText(snippet, tokens) + "</div>");
                    }

                    var kwsText = kws && kws.length ? kws.join(", ") : "";

                            '<div class="dir-index-search-keywords">Keywords: '
                            + highlightText(kwsText, tokens)

        function applyFilter(pre) {

        function parseHashSort() {

            var m = h.match(/sort=([a-z]+)/i);
            if (!m) {

            var key = m[1].toLowerCase();
            if (key === "name" || key === "modified") {

            }

        function initPre(pre) {
            ensureSearchUi(pre);
            var links = document.querySelectorAll(".dir-index-controls a[data-sort-link]");
            for (var i = 0; i < links.length; i++) {
                (function (a) {
                    a.addEventListener("click", function (e) {
                        if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) {
                            return;
                        }
                        var key = a.getAttribute("data-sort-link") || "name";
                        if (!key) {
                            return;
                        }
                        e.preventDefault();
                        var currentKey = pre.getAttribute("data-sort") || "name";
                        var currentDir = pre.getAttribute("data-dir") || defaultDirFor(currentKey);
                        var dir = currentKey === key
                            ? (currentDir === "asc" ? "desc" : "asc")
                            : defaultDirFor(key);
                        pre.setAttribute("data-sort", key);
                        pre.setAttribute("data-dir", dir);
                        applyFilter(pre);
                    });
                })(links[i]);
            }

            var input = getFilterInput(pre);
            if (input) {
                input.addEventListener("input", function () {
                    applyFilter(pre);
                });
            }

            var scope = getScopeToggle(pre);
            if (scope) {
                scope.addEventListener("change", function () {
                    applyFilter(pre);
                });
            }

            var hashKey = parseHashSort();
            var initKey = hashKey || pre.getAttribute("data-sort") || "name";
            var initDir = pre.getAttribute("data-dir") || defaultDirFor(initKey);
            pre.setAttribute("data-sort", initKey);
            pre.setAttribute("data-dir", initDir);
            applyFilter(pre);
        }

        function run() {
            var pres = document.querySelectorAll("pre.dir-index-table");
            for (var i = 0; i < pres.length; i++) {
                initPre(pres[i]);
            }
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", run);
        } else {
            run();
        }
    })();

<script>
    (function () {

            var BLOCK1 = /^(DIV|LI|TR|TH|TD|SECTION|ARTICLE|HEADER|FOOTER|NAV|ASIDE|FIGURE|FIGCAPTION)$/;
            function nodeToText(root) {

                    if (n.nodeType === 3) { buf.push(n.nodeValue || ''); return; }
                    if (n.nodeType !== 1) { return; }

                    host.style.cssText = 'position:fixed;left:-99999px;top:0;background:white;' +
                        'padding:14px;pointer-events:none;z-index:-9999;';
                    var mdc = document.querySelector('.md-container');

                    host.appendChild(frag);
                    document.body.appendChild(host);

                    // Inline computed styles on every element so the SVG needs no stylesheet.
                    var PROPS = ['display','position','top','left','right','bottom',
                        'width','height','min-width','min-height',
                        'font-family','font-size','font-style','font-weight',
                        'line-height','letter-spacing','text-align','white-space',
                        'vertical-align',
                        'margin-top','margin-right','margin-bottom','margin-left',
                        'padding-top','padding-right','padding-bottom','padding-left',
                        'border-top','border-right','border-bottom','border-left',
                        'color','background-color','overflow'];
                    var hostEls = host.querySelectorAll('*');
                    for (var i = 0; i < hostEls.length; i++) {
                        var cs = window.getComputedStyle(hostEls[i]);
                        var s = '';
                        for (var k = 0; k < PROPS.length; k++) {
                            var v = cs.getPropertyValue(PROPS[k]);
                            if (v) {

                                    v = v.replace(/KaTeX_[A-Za-z0-9]+,?\s*/g, '').replace(/^,\s*/, '');

                    }

                    var W = host.scrollWidth + 28;
                    var H = host.scrollHeight + 28;
                    var inner = host.innerHTML;
                    document.body.removeChild(host);

                    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '">' +
                        '<foreignObject width="' + W + '" height="' + H + '">' +
                        '<div xmlns="http://www.w3.org/1999/xhtml" ' +
                        'style="background:white;padding:14px;box-sizing:border-box;width:' + W + 'px;">' +
                        inner + '</div></foreignObject></svg>';

            // Callback receives a data: string or null on failure.

                        'font-family','font-size','font-style','font-weight',
                        'line-height','letter-spacing','text-align','white-space',
                        'vertical-align',
                        'margin-top','margin-right','margin-bottom','margin-left',
                        'padding-top','padding-right','padding-bottom','padding-left',
                        'border-top','border-right','border-bottom','border-left',

                        '<foreignObject width="' + W2 + '" height="' + H2 + '">' +
                        '<div xmlns="http://www.w3.org/1999/xhtml" ' +
                        'style="background:white;padding:3px;box-sizing:border-box;width:' + W2 + 'px;white-space:nowrap;">' +
                        inner2 + '</div></foreignObject></svg>';

                    var url2 = URL.createObjectURL(svgBlob2);

                // This makes formulas paste as rendered images in Gmail, LibreOffice, etc.

                    var selBlob = null;
                    var fUris = new Array(fSpans.length);

                    function onPart() {

                        var fragI = range.cloneContents();
                        var mI = Array.prototype.slice.call(fragI.querySelectorAll('[data-latex]'));

                            var me = mI[ii];
                            var isDisplay = (me.getAttribute('data-latex') || '').slice(0, 2) === '$$';
                            var uri = fUris[ii];
                            if (uri) {
                                var imgTag = document.createElement('img');
                                imgTag.src = uri;
                                imgTag.style.cssText = isDisplay
                                    ? 'display:block;margin:0.4em auto;'
                                    : 'display:inline-block;vertical-align:middle;';
                                me.parentNode.replaceChild(imgTag, me);
                            } else {
                                me.parentNode.replaceChild(
                                    document.createTextNode(me.getAttribute('data-latex') || ''), me
                                );
                            }
                        }
                        var wI = document.createElement('div');
                        wI.appendChild(fragI);
                        var items = {
                            'text/plain': new Blob([text], { type: 'text/plain' }),
                            'text/html': new Blob([wI.innerHTML], { type: 'text/html' })
                        };
                        if (selBlob) { items['image/png'] = selBlob; }
                        navigator.clipboard.write([new ClipboardItem(items)]).catch(function () { });
                    }

                    for (var fi = 0; fi < fSpans.length; fi++) {
                        (function (idx, fs) {

            // $$ display math is detected before single $ inline math.
            function splitMath(text) {

                var rem = text;
                while (rem.length) {
                    var di = rem.indexOf('$');
                    if (di < 0) { parts.push({ math: false, text: rem }); break; }
                    if (di > 0) {

                        rem = rem.slice(di);
                        continue;

                    if (rem.slice(0, 2) === '$$') {
                        var ci = rem.indexOf('$$', 2);
                        if (ci < 0) { parts.push({ math: false, text: rem }); break; }
                        parts.push({ math: true, display: true,

                        rem = rem.slice(ci + 2);

                        parts.push({ math: true, display: false,

                        rem = rem.slice(ci2 + 1);

                                    { displayMode: pt.display, throwOnError: false });
                            } catch (_e) { el.textContent = pt.src; }
                            frag.appendChild(el);
                        }

                });
            }

            function load(src, cb) {
                var s = document.createElement('script');
                s.src = src; s.onload = cb;
                document.head.appendChild(s);
            }

            // Load only katex.min.js (no auto-render needed).
            load(BASE + 'katex.min.js', function () {
                var mdc = document.querySelector('.md-container');
                if (mdc) { renderMathInContainer(mdc); }
            });
        } catch (e) { }
    })();

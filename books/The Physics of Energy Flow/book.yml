title: The Physics of Energy Flow
subtitle: Part I — Energy Flows
author: An M. Rodriguez
description: "Source-free energy flow is treated as the primitive condition from which the observed structure of physics is recovered."
summary: "Interaction implies a shared substrate, identified here as energy. Ordered registrations of that energy are joined by flow rather than by primitive creation or annihilation. From that source-free continuity, the book derives Maxwellian double-curl transport, shows that bounded standing flow organizes discretely, recovers Schrodinger dynamics as a narrow-band approximation of the same wave equation, and then treats mass, charge, and gravity as properties of organized electromagnetic closures, with gravity read as refraction of one self-sustained flow by another."

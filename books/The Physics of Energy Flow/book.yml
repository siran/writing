description: "Part I derives known physics from first principles: energy flows. When it flows over itself, energy flow has to organize discretely in order to remain consistent. Schrodinger dynamics emerges as an approximation of the energy flow wave equation. Mass being described as a standing wave of energy  flow,  gravity emerges as refraction when energy wave (light) bends toward regions of higher energy density."

title: "The Theory of (Re)Cognition"
subtitle: "Truth, pattern, and the recognition by which knowing becomes possible"
author: An M. Rodriguez
description: "A first-principles account of truth, knowing, and error that begins not with proof, but with recognition: the repeated encounter with patterns, the way they affect us, the way we encode them, and the way we learn to recognize them again."
excerpt: "Truth can't first be proven true. It must first be recognized as such. This book treats truth operationally, through repeated patterned encounter, encoding, and recognition, and then asks how knowing can emerge from that process without pretending that definition comes first."
